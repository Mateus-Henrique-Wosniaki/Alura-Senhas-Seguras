<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senha Moderno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="conteudo">
        <header class="conteudo-titulo">
            <h1 class="titulo-principal">Gerador de Senhas</h1>
            <p class="titulo-secundario">Crie senhas fortes e aleatórias instantaneamente</p>
        </header>
        
        <section class="conteudo-senha">
            <div class="input-container">
                <input type="text" id="campo-senha" placeholder="Sua senha aparecerá aqui" readonly>
            </div>
            
            <div class="barra-seguranca-container">
                <div id="barra-indicador" class="barra-seguranca"></div>
            </div>
            <p id="texto-forca" class="entropia">Selecione uma opção</p>
        </section>
        
        <section class="parametro">
            <h2 class="parametro-titulo">Personalize sua senha</h2>
            
            <div class="parametro-coluna__senha">
                <div class="parametro-senha">
                    <h3 class="parametro-senha__titulo">Número de caracteres</h3>
                    <div class="parametro-senha-botoes">
                        <button type="button" id="btn-menos" class="parametro-senha__botao">-</button>
                        <p id="tamanho-texto" class="parametro-senha__texto">12</p>
                        <button type="button" id="btn-mais" class="parametro-senha__botao">+</button>
                    </div>
                </div>               
                
                <div class="parametro-senha">
                    <h3 class="parametro-senha__titulo">Características</h3>
                    <div class="checkbox-container">
                        <label class="checkbox-label">
                            <input type="checkbox" class="checkbox-opcao" checked> Letras Maiúsculas
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="checkbox-opcao" checked> Letras Minúsculas
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="checkbox-opcao" checked> Números
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="checkbox-opcao"> Símbolos
                        </label>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
